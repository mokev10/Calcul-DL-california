- name: Debug repo layout before install
  run: |
    echo "PWD: $(pwd)"
    echo "GITHUB_WORKSPACE: $GITHUB_WORKSPACE"
    echo "Root listing:"
    ls -la
    echo
    echo "Show setup.py at root if present:"
    if [ -f setup.py ]; then echo "=== setup.py ==="; sed -n '1,200p' setup.py; else echo "no setup.py at root"; fi
    echo
    echo "Show pyproject.toml at root if present:"
    if [ -f pyproject.toml ]; then echo "=== pyproject.toml ==="; sed -n '1,200p' pyproject.toml; else echo "no pyproject.toml at root"; fi
    echo
    echo "Listing pdf417gen dir at root if present:"
    ls -la pdf417gen || true
    echo
    echo "If there is a nested folder with the repo name, list it:"
    if [ -d Calcul-DL-california ]; then ls -la Calcul-DL-california || true; fi
    echo
    echo "Show setup.py in nested folder if present:"
    if [ -f Calcul-DL-california/setup.py ]; then echo "=== nested setup.py ==="; sed -n '1,200p' Calcul-DL-california/setup.py; else echo "no setup.py in Calcul-DL-california"; fi

- name: Install package (editable) from subfolder path
  run: python -m pip install -e ./Calcul-DL-california


