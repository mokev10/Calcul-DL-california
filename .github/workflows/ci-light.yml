- name: Debug repo layout before install
  run: |
    echo "PWD: $(pwd)"
    echo "GITHUB_WORKSPACE: $GITHUB_WORKSPACE"
    echo "Current branch:"
    git rev-parse --abbrev-ref HEAD || true
    echo
    echo "Root listing:"
    ls -la
    echo
    echo "Show setup.py / pyproject.toml at root:"
    [ -f setup.py ] && echo "FOUND setup.py at root" && sed -n '1,120p' setup.py || echo "no setup.py at root"
    [ -f pyproject.toml ] && echo "FOUND pyproject.toml at root" && sed -n '1,120p' pyproject.toml || echo "no pyproject.toml at root"
    echo
    echo "Listing repo subfolder (if exists):"
    ls -la Calcul-DL-california || true
    echo
    echo "Show nested setup.py if present:"
    [ -f Calcul-DL-california/setup.py ] && echo "FOUND nested setup.py" && sed -n '1,120p' Calcul-DL-california/setup.py || echo "no nested setup.py"
    echo
    echo "List pdf417gen if present:"
    ls -la pdf417gen || ls -la Calcul-DL-california/pdf417gen || true

- name: Install package (editable) from subfolder path
  run: python -m pip install -e ./Calcul-DL-california


