      - name: Debug pdf417gen package (print files and __init__.py)
        run: |
          echo "=== ls -la pdf417gen ==="
          ls -la pdf417gen || true
          echo
          echo "=== head -n 200 pdf417gen/__init__.py ==="
          if [ -f pdf417gen/__init__.py ]; then sed -n '1,200p' pdf417gen/__init__.py; else echo "NO FILE: pdf417gen/__init__.py not found"; fi
          echo
          echo "=== show any pdf417gen.py at repo root ==="
          if [ -f pdf417gen.py ]; then sed -n '1,200p' pdf417gen.py; else echo "no pdf417gen.py at repo root"; fi
          echo
          echo "=== python introspect pdf417gen ==="
          python - <<'PY'
import importlib, sys, traceback, os
print("CWD:", os.getcwd())
print("sys.path[0]:", sys.path[0])
try:
    mod = importlib.import_module("pdf417gen")
    print("pdf417gen.__file__:", getattr(mod, "__file__", None))
    print("has parse attr:", hasattr(mod, "parse"))
    print("callable parse:", callable(getattr(mod, "parse", None)))
    print("dir(pdf417gen) sample:", [n for n in dir(mod) if n in ('parse','get_version','get_age','get_full_name')])
except Exception:
    traceback.print_exc()
PY
